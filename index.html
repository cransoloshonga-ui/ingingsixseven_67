<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <!-- นำเข้า Google Fonts และ Tailwind CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        /* ปรับแต่งเว็บแคมให้แสดงผลเต็มพื้นที่และขอบมน */
        #webcam-container canvas {
            display: block;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100% !important;
            height: auto !important;
            max-width: 280px;
            margin: 0 auto;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md text-center border border-gray-100">
        <!-- หัวข้อ -->
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Teachable Machine</h1>
        <p class="text-sm text-gray-500 mb-6">ระบบวิเคราะห์รูปภาพผ่านเว็บแคม (อัปเดตทุก 3 วินาที)</p>

        <!-- ปุ่มควบคุม -->
        <div class="mb-6">
            <button type="button" id="start-btn" onclick="init()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition duration-200 shadow-md cursor-pointer">
                เริ่มทำงาน (Start)
            </button>
        </div>

        <!-- พื้นที่แสดงกล้อง -->
        <div class="relative flex justify-center mb-6">
            <div id="webcam-container" class="relative overflow-hidden rounded-xl bg-gray-100 flex items-center justify-center min-h-[240px] w-full max-w-[280px]">
                <div id="placeholder-text" class="text-gray-400 text-sm p-4">กดปุ่มเริ่มทำงานเพื่อเปิดกล้อง</div>
            </div>
            <!-- สัญลักษณ์แจ้งเตือนการสแกนทุก 3 วินาที -->
            <div id="scan-indicator" class="absolute top-2 right-6 bg-green-500 text-white text-xs px-2.5 py-1 rounded-full hidden animate-pulse z-10">
                กำลังวิเคราะห์...
            </div>
        </div>

        <!-- พื้นที่แสดงผลลัพธ์ -->
        <div class="text-left">
            <h2 class="text-sm font-semibold text-gray-600 mb-3 uppercase tracking-wider">ผลการวิเคราะห์</h2>
            <div id="label-container" class="space-y-3">
                <p class="text-gray-400 text-sm text-center py-2">ยังไม่มีข้อมูล</p>
            </div>
        </div>
    </div>

    <!-- สคริปต์ของ Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // ลิงก์โมเดล
        const URL = "https://teachablemachine.withgoogle.com/models/SXsfrFTj_/";

        let model, webcam, labelContainer, maxPredictions;
        let predictInterval;

        // ฟังก์ชันเริ่มต้นระบบ
        async function init() {
            const startBtn = document.getElementById("start-btn");
            startBtn.disabled = true;
            startBtn.innerText = "กำลังโหลดโมเดลและเปิดกล้อง...";
            startBtn.classList.replace("bg-blue-600", "bg-gray-400");

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // โหลดโมเดล
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // ตั้งค่าเว็บแคมให้ตรงตามสเปคโครงสร้างโมเดล (200x200) เพื่อให้ภาพแสดงผลได้ถูกต้อง
            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip); 
            await webcam.setup(); 
            await webcam.play();
            
            // ลบข้อความสแตนด์บายออกแล้วนำกล้องใส่เข้าไปแทน
            document.getElementById("placeholder-text").remove();
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            // เตรียมโครงสร้างสำหรับแสดงผลแถบความมั่นใจ (Progress Bar)
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; 
            
            for (let i = 0; i < maxPredictions; i++) {
                const itemDiv = document.createElement("div");
                itemDiv.className = "bg-gray-50 rounded-lg p-2 border border-gray-100 shadow-xs";
                itemDiv.innerHTML = `
                    <div class="flex justify-between text-sm font-medium text-gray-700 mb-1">
                        <span class="class-name">กำลังโหลดคลาส...</span>
                        <span class="class-percentage text-blue-600">0%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2">
                        <div class="progress-bar bg-blue-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                `;
                labelContainer.appendChild(itemDiv);
            }

            // ซ่อนปุ่มเริ่มทำงานหลังจากติดตั้งเสร็จสิ้น
            startBtn.parentElement.remove();

            // รัน loop สำหรับอัปเดตภาพเคลื่อนไหวของกล้องให้ไหลลื่นเป็นปกติ
            window.requestAnimationFrame(loop);

            // แยกส่วนการทำนายผลออกมารันทุกๆ 3 วินาที (3000 มิลลิวินาที)
            predictInterval = setInterval(async () => {
                const indicator = document.getElementById("scan-indicator");
                indicator.classList.remove("hidden");
                
                await predict();
                
                setTimeout(() => {
                    indicator.classList.add("hidden");
                }, 800);
            }, 3000);
        }

        // ฟังก์ชันอัปเดตเฟรมภาพเว็บแคม (ทำงานต่อเนื่องเพื่อให้เห็นหน้ากล้องขยับตลอดเวลา)
        async function loop() {
            webcam.update();
            window.requestAnimationFrame(loop);
        }

        // ฟังก์ชันทำนายผล (ทำงานทุกๆ 3 วินาที)
        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            
            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = prediction[i].probability;
                const percentage = (probability * 100).toFixed(0) + "%";
                
                const item = labelContainer.childNodes[i];
                item.querySelector(".class-name").innerText = className;
                item.querySelector(".class-percentage").innerText = percentage;
                
                const progressBar = item.querySelector(".progress-bar");
                progressBar.style.width = percentage;

                // ไฮไลท์เป็นสีเขียวเมื่อความน่าจะเป็นมากกว่า 50%
                if (probability > 0.5) {
                    progressBar.classList.replace("bg-blue-500", "bg-green-500");
                } else {
                    progressBar.classList.replace("bg-green-500", "bg-blue-500");
                }
            }
        }
    </script>
</body>
</html>
